name: Test ntfy notification

# Bấm-tay để gửi một tin ntfy thử nghiệm tới điện thoại, xác nhận đúng topic.
# Không ảnh hưởng pipeline dự đoán.
on:
  workflow_dispatch:
    inputs:
      message:
        description: "Nội dung tin thử (để trống dùng mặc định)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test-ntfy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test notification
        env:
          NTFY_TOPIC: lotto535-thuan
          MSG: ${{ github.event.inputs.message }}
        run: |
          python scripts/notify_ntfy.py \
            --topic "$NTFY_TOPIC" \
            --title "🧪 Test — thông báo trúng config đã sẵn sàng" \
            --message "${MSG:-Đây là tin thử nghiệm từ hệ thống Lotto 5/35.

          Từ giờ, nếu vé của bất kỳ config nào (12 nhà toán học Ấn Độ) trúng >=4/5 số chính ở kỳ vừa quay, bạn sẽ nhận thông báo tự động tại đây:
          • 5 số + ĐB -> JACKPOT 1
          • 5 số -> JACKPOT 2
          • 4 số -> giải phụ 4/5

          Nếu đọc được tin này tức là điện thoại đã nhận đúng topic lotto535-thuan.}" \
            --priority default \
            --tags test_tube,bell
