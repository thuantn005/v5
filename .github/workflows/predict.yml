name: Lotto 5/35 Predict & Notify

on:
  schedule:
    # Draws happen at 13:00 and 21:00 Vietnam time (UTC+7).
    # We run ~1h after each draw to give the data source time to update:
    # 14:00 ICT = 07:00 UTC, 22:00 ICT = 15:00 UTC
    #
    # NOTE: cron minute is intentionally NOT ":00" -- GitHub Actions'
    # scheduler queues everyone who requests the top of the hour at once,
    # which is the single most common cause of scheduled workflows firing
    # late or getting silently dropped during high load. Off-peak minutes
    # (here :07 and :12) run far more reliably. We also add two backup
    # triggers 30-40 min later in case the primary slot is skipped -- the
    # pipeline is idempotent per draw (multi_log.resolve_all() only acts
    # once a new draw is actually available), so an extra run is harmless.
    - cron: "7 7 * * *"     # ~14:07 ICT (primary)
    - cron: "37 7 * * *"    # ~14:37 ICT (backup, in case primary was dropped)
    - cron: "12 15 * * *"   # ~22:12 ICT (primary)
    - cron: "42 15 * * *"   # ~22:42 ICT (backup)
  workflow_dispatch: {}     # allows manual "Run workflow" button too

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest draw data
        run: python scripts/fetch_data.py

      - name: Run full pipeline (Claude predict -> jackpot check -> notify -> log)
        env:
          NTFY_TOPIC: lotto535-thuan
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Generate dashboard data for GitHub Pages
        run: python scripts/generate_dashboard_data.py

      - name: Commit updated data, logs & dashboard
        run: |
          git config user.name "lotto535-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/all.csv state/ docs/data.json
          git diff --cached --quiet || git commit -m "chore: update data, model logs & dashboard [skip ci]"
          git push
