name: Lotto 5/35 Predict & Notify

on:
  schedule:
    # Draws happen at 13:00 and 21:00 Vietnam time (UTC+7). We need a result
    # within 1 hour of the draw, so we run at +35min (primary) and +50min
    # (backup) -- fetch_data.py now always also checks the fast independent
    # scraper (minhchinh.com, updates within minutes of a draw) in addition
    # to the primary dataset (which can take 2-4h to publish), so +35min is
    # comfortably enough margin in practice.
    #
    # NOTE: cron minute is intentionally NOT ":00" -- GitHub Actions'
    # scheduler queues everyone who requests the top of the hour at once,
    # which is the single most common cause of scheduled workflows firing
    # late or getting silently dropped during high load. Off-peak minutes
    # run far more reliably. The pipeline is idempotent per draw
    # (multi_log.resolve_all() / run_pipeline.already_predicted() dedup),
    # so an extra run is harmless.
    - cron: "35 6 * * *"    # ~13:35 ICT (primary, 35 min after the 13:00 draw)
    - cron: "50 6 * * *"    # ~13:50 ICT (backup)
    - cron: "35 14 * * *"   # ~21:35 ICT (primary, 35 min after the 21:00 draw)
    - cron: "50 14 * * *"   # ~21:50 ICT (backup)
  workflow_dispatch: {}     # allows manual "Run workflow" button too

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest draw data
        run: python scripts/fetch_data.py

      - name: Run full pipeline (tune -> backtest -> ensemble -> notify -> log)
        env:
          NTFY_TOPIC: lotto535-thuan
        run: python scripts/run_pipeline.py

      - name: Generate dashboard data for GitHub Pages
        run: python scripts/generate_dashboard_data.py

      - name: Commit updated data, logs & dashboard
        run: |
          git config user.name "lotto535-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/all.csv state/ docs/data.json
          git diff --cached --quiet || git commit -m "chore: update data, model logs & dashboard [skip ci]"
          git push
