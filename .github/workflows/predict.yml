name: Lotto 5/35 Predict & Notify

on:
  schedule:
    # Draws happen at 13:00 and 21:00 Vietnam time (UTC+7). We run ~2 HOURS
    # after each draw (15:00 and 23:00 ICT) so both the fast scraper AND the
    # slower primary dataset (which can take 2-4h to publish) have had ample
    # time -- and the jackpot figure, which drives the "kỳ chia giải" alerts,
    # is far more likely to be published by then.
    #
    # Reliability notes (why it's laid out this way):
    #  - cron minute is intentionally NOT ":00". GitHub Actions queues every
    #    top-of-hour request at once, the single most common cause of a
    #    scheduled run firing very late or getting silently dropped.
    #  - GitHub's free scheduler is best-effort: runs can be delayed by
    #    minutes to several HOURS under load (we have observed ~5h drift).
    #    This is a platform limitation we cannot remove -- so we (a) fire a
    #    primary + backup trigger per draw, and (b) rely on the pipeline
    #    being idempotent per draw (run_pipeline.already_predicted() /
    #    multi_log.resolve_all() dedup), so a late/extra/dropped run is
    #    harmless: whichever attempt actually lands does the work exactly
    #    once, and the 2h margin absorbs the drift.
    #  - Scheduled workflows only run from the DEFAULT branch (main) and are
    #    auto-disabled after 60 days with no repo commits; the daily
    #    auto-commit step below keeps the schedule alive.
    - cron: "7 8 * * *"     # ~15:07 ICT (primary, 2h after the 13:00 draw)
    - cron: "27 8 * * *"    # ~15:27 ICT (backup)
    - cron: "7 16 * * *"    # ~23:07 ICT (primary, 2h after the 21:00 draw)
    - cron: "27 16 * * *"   # ~23:27 ICT (backup)
  workflow_dispatch: {}     # allows manual "Run workflow" button too

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest draw data
        run: python scripts/fetch_data.py

      - name: Run pipeline (build 3 tickets -> notify -> log -> resolve)
        env:
          NTFY_TOPIC: lotto535-thuan
        run: python scripts/run_pipeline.py

      - name: Generate dashboard data for GitHub Pages
        run: python scripts/generate_dashboard_data.py

      - name: Generate config tickets for dashboard panel
        run: python scripts/gen_config_tickets.py --csv data/all.csv --out docs/config_tickets.json

      - name: Commit updated data, logs & dashboard
        run: |
          git config user.name "lotto535-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/all.csv state/ docs/data.json docs/config_tickets.json
          git diff --cached --quiet || git commit -m "chore: update data, model logs & dashboard [skip ci]"
          git push
